# Upskill configuration
#
# TEACHER: strong model for analyzing failures and generating skills.
# STUDENT: weak model that Skills are validated against and optimized for.
#
# Your DAILY model is set in Claude Code settings.json — independent of these.
# Upskill reacts to failures from any model.

UPSKILL_TEACHER="deepseek-v4-pro[1m]"
UPSKILL_STUDENT="deepseek-v4-flash"

# SERVE_MODE: how Skills are served during normal CC use.
#
#   interactive  Use /upskill-run to start. Shows ALL skills with matched ones
#                starred as recommendations. You pick which to apply,
#                then choose whether to switch models. (Default.)
#
#   auto         Automatic keyword matching on every prompt. Matched skills
#                are suggested before execution. You confirm whether to
#                apply and whether to switch models.
UPSKILL_SERVE_MODE="interactive"
